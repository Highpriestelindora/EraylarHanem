<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 15 Pro Simulator | Eraylar Hanem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --titanium-bg: #d4d4d8;
            --titanium-dark: #71717a;
            --screen-bg: #000;
            --bezel: #18181b;
            --bezel-width: 12px;
            --radius: 54px;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #2e1065, #000);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Simulator Side Controls */
        .simulator-controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 20px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 160px;
        }

        .btn {
            background: white;
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }

        /* iPhone Chassis */
        .iphone-frame {
            position: relative;
            width: 417px; /* 393px + bezels */
            height: 876px; /* 852px + bezels */
            background: linear-gradient(135deg, var(--titanium-bg), var(--titanium-dark));
            border-radius: var(--radius);
            padding: var(--bezel-width);
            box-shadow: 
                0 50px 100px -20px rgba(0,0,0,0.5),
                0 30px 60px -30px rgba(0,0,0,0.6),
                inset 0 0 2px 2px rgba(255,255,255,0.3);
            border: 4px solid #3f3f46;
        }

        /* Screen Wrapper */
        .iphone-screen {
            position: relative;
            width: 393px;
            height: 852px;
            background: var(--screen-bg);
            border-radius: calc(var(--radius) - var(--bezel-width));
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
        }

        /* Iframe App */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        /* Dynamic Island */
        .dynamic-island {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 36px;
            background: black;
            border-radius: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .dynamic-island:hover {
            width: 280px;
            height: 40px;
        }

        .island-camera {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle at 30% 30%, #1e1b4b, #000);
            border-radius: 50%;
            opacity: 0.8;
        }

        /* Home Indicator */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            background: white;
            border-radius: 10px;
            z-index: 100;
            opacity: 0.8;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            pointer-events: none;
        }

        /* Buttons on Side */
        .volume-buttons {
            position: absolute;
            left: -8px;
            top: 180px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .v-btn {
            width: 4px;
            height: 60px;
            background: #52525b;
            border-radius: 2px 0 0 2px;
        }

        .power-btn {
            position: absolute;
            right: -8px;
            top: 240px;
            width: 4px;
            height: 100px;
            background: #52525b;
            border-radius: 0 2px 2px 0;
        }

        /* Status Bar Simulation */
        .status-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 44px;
            padding: 0 34px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 700;
            z-index: 90;
            color: white;
            pointer-events: none;
        }

        .status-right {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .battery {
            width: 24px;
            height: 12px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 3px;
            padding: 1px;
        }

        .battery-fill {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 1px;
        }

        /* Label */
        .footer-label {
            margin-top: 30px;
            opacity: 0.5;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 900;
        }

        @media (max-height: 900px) {
            .iphone-frame { transform: scale(0.85); margin-top: 40px; }
        }
    </style>
</head>
<body>

    <div class="simulator-controls">
        <span style="font-weight: 900; margin-right: 10px; display: flex; align-items: center; gap: 8px;">
            <span style="color: #fbbf24">📱</span> iPhone 15 Pro Test Mode
        </span>
        <button class="btn" onclick="refreshIframe()">Yenile</button>
        <button class="btn" style="background: #22c55e; color: white;" onclick="toggleSafeAreas()">Safe Areas Göster</button>
    </div>

    <div class="iphone-frame">
        <div class="volume-buttons">
            <div class="v-btn" style="height: 35px; top: -50px;"></div> <!-- Action Button -->
            <div class="v-btn"></div>
            <div class="v-btn"></div>
        </div>
        <div class="power-btn"></div>

        <div class="iphone-screen">
            <div class="status-bar">
                <span>21:49</span>
                <div class="status-right">
                    <span>📶</span>
                    <span>📶</span>
                    <div class="battery"><div class="battery-fill"></div></div>
                </div>
            </div>

            <div class="dynamic-island">
                <div class="island-camera"></div>
                <div style="width: 4px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 50%;"></div>
            </div>

            <iframe id="app-frame" src="http://localhost:5173/"></iframe>

            <div class="home-indicator"></div>
        </div>
    </div>

    <div class="footer-label">Eraylar Hanem · Premium Lab v2.6.11</div>

    <script>
        function refreshIframe() {
            const frame = document.getElementById('app-frame');
            frame.src = frame.src;
        }

        let safeAreasVisible = false;
        function toggleSafeAreas() {
            const frame = document.getElementById('app-frame');
            safeAreasVisible = !safeAreasVisible;
            if (safeAreasVisible) {
                frame.style.borderTop = '44px solid rgba(239, 68, 68, 0.2)';
                frame.style.borderBottom = '34px solid rgba(239, 68, 68, 0.2)';
            } else {
                frame.style.borderTop = 'none';
                frame.style.borderBottom = 'none';
            }
        }
    </script>
</body>
</html>
