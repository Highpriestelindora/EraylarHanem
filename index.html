<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#F8F5FD;--card:#fff;--primary:#9B59B6;--pL:#EDE0F5;--mutfak:#E74C3C;--mutfakL:#FDEDEC;--arac:#5D6D7E;--sec:#2D6A4F;--sL:#D8F3DC;--acc:#E76F51;--txt:#2C2C2C;--txtL:#999;--brd:#E8E0F0;--danger:#E74C3C;--dangerL:#FDEDEC;--succ:#27AE60;--succL:#D5F5E3;--warn:#F39C12;--warnL:#FEF9E7;--r:14px;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);--safe-l:env(safe-area-inset-left,0px);--safe-r:env(safe-area-inset-right,0px)}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt)}
.app{display:flex;flex-direction:column;height:100dvh;height:-webkit-fill-available}
.hdr{padding:12px 18px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;padding-top:calc(12px + var(--safe-t));padding-left:calc(18px + var(--safe-l));padding-right:calc(18px + var(--safe-r))}
.hdr h1{color:#fff;font-family:'Fraunces',serif;font-size:17px;font-weight:800}
.hdr small{color:rgba(255,255,255,.6);font-size:9px}
.cnt{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + var(--safe-b));padding-left:calc(16px + var(--safe-l));padding-right:calc(16px + var(--safe-r))}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:6px 0;padding-bottom:calc(6px + var(--safe-b));padding-left:var(--safe-l);padding-right:var(--safe-r);z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.nav button{background:none;border:none;cursor:pointer;padding:6px 2px;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:44px;min-height:44px;justify-content:center}
.nav .ico{font-size:20px;transition:.15s}.nav .lbl{font-size:8px;font-weight:800}.nav .on .ico{transform:translateY(-2px)}.nav .on .dot{width:4px;height:4px;border-radius:2px;margin-top:1px}
.cd{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:0 1px 8px rgba(0,0,0,.05);border:1px solid var(--brd);margin-bottom:12px}
h2{font-family:'Fraunces',serif;font-size:20px;font-weight:800;margin-bottom:14px}
h3{font-family:'Fraunces',serif;font-size:15px;margin-bottom:10px}
input,select,textarea{padding:10px 12px;border:1px solid var(--brd);border-radius:12px;font-size:14px;font-family:'Nunito';outline:none;background:var(--bg);width:100%;color:var(--txt)}
input:focus,select:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 18px;border:none;border-radius:12px;font-size:13px;font-family:'Nunito';font-weight:700;cursor:pointer;transition:.15s;width:100%}.btn:active{transform:scale(.97)}
.bp{background:var(--primary);color:#fff}.bm{background:var(--mutfak);color:#fff}.ba{background:var(--arac);color:#fff}.bs{background:var(--sL);color:var(--sec)}.bd{background:var(--dangerL);color:var(--danger)}.bg{background:var(--card);color:var(--txtL);border:1px solid var(--brd)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fc{display:flex;flex-direction:column;gap:10px}
.fl{font-size:10px;color:var(--txtL);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800}
.del{background:none;border:none;cursor:pointer;font-size:14px;color:var(--danger);padding:4px}
.ubtn{background:rgba(255,255,255,.2);border:none;border-radius:20px;padding:6px 14px;color:#fff;font-size:12px;font-family:'Nunito';font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.fi{animation:fi .25s ease-out}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.login{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:24px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sd{width:8px;height:8px;border-radius:4px;display:inline-block;margin-right:4px}.sd.on{background:var(--succ);animation:pulse 2s infinite}.sd.off{background:var(--danger)}
.mt{border-radius:20px;padding:22px 14px;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden}.mt:active{transform:scale(.96)}
.wr{display:grid;grid-template-columns:50px 1fr 1fr 30px;padding:9px 8px;align-items:center;border-bottom:1px solid var(--brd)}.wr.cls-dis{background:#EBF5FB;border-left:3px solid #2980B9}
.ml{font-size:11px;padding:4px 8px;border-radius:8px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ml.ok{background:var(--sL);color:var(--sec)}.ml.no{background:var(--bg);color:var(--txtL);font-style:italic}.ml.ms{background:var(--dangerL);color:var(--danger)}
.wr.td{background:var(--pL);border-left:3px solid var(--primary)}.wr.we .dn{color:var(--mutfak)}
.rc{background:var(--card);border-radius:var(--r);border:1px solid var(--brd);overflow:hidden;cursor:pointer;transition:.2s}.rc:active{transform:scale(.97)}
.si{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--brd)}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.md{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:85dvh;overflow-y:auto;padding:20px;animation:su .3s ease-out}@keyframes su{from{transform:translateY(100%)}to{transform:none}}
.mf{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;overflow-y:auto;animation:fi .2s}
.dam{width:70px;height:140px;border-radius:10px 10px 18px 18px;border:3px solid var(--brd);position:relative;overflow:hidden;background:var(--card)}
.dam .wt{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#85C1E9,#3498DB);transition:height .3s;border-radius:0 0 15px 15px}
.dam .pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:800;z-index:1;text-shadow:0 0 4px rgba(255,255,255,.8)}
.sinp{width:55px;padding:5px;text-align:center;font-size:12px;border:1px solid var(--brd);border-radius:8px;background:var(--bg)}
.postit{width:110px;min-height:90px;padding:10px;border-radius:3px;box-shadow:2px 2px 6px rgba(0,0,0,.1);cursor:pointer;font-size:10px;line-height:1.4;transform:rotate(var(--rot));transition:.2s}.postit:active{transform:rotate(0deg) scale(1.05)}
.cc{border-radius:16px;padding:18px;color:#fff;margin-bottom:10px;position:relative}
</style>
</head>

window.DIAG_LOG=[];
window.DIAG_PERF={startTs:Date.now(),renders:0,slowOps:[]};

// Önceki session hatalarını yükle
try{const prev=sessionStorage.getItem('eray-diag');if(prev)window.DIAG_LOG=JSON.parse(prev)||[]}catch(e){}

function diagPush(entry){
  window.DIAG_LOG.unshift(entry);
  if(window.DIAG_LOG.length>100)window.DIAG_LOG=window.DIAG_LOG.slice(0,100);
  try{sessionStorage.setItem('eray-diag',JSON.stringify(window.DIAG_LOG))}catch(e){}
}

// JavaScript hataları
window.onerror=function(msg,src,line,col,err){
  diagPush({ts:new Date().toLocaleString('tr-TR'),type:'🔴 JS Hatası',
    msg:String(msg),
    loc:(src?src.split('/').pop():'')+':'+line+':'+col,
    stack:err&&err.stack?err.stack.slice(0,800):''});
  return false};

// Promise hataları
window.onunhandledrejection=function(ev){
  diagPush({ts:new Date().toLocaleString('tr-TR'),type:'🟠 Promise Hatası',
    msg:ev.reason?(String(ev.reason.message||ev.reason)):'Bilinmeyen promise hatası',
    loc:'',stack:ev.reason&&ev.reason.stack?ev.reason.stack.slice(0,800):''})};

// Manuel iz bırakma fonksiyonu — kritik noktalarda çağrılır
function diagTrace(label,data){
  diagPush({ts:new Date().toLocaleString('tr-TR'),type:'🔵 İz',
    msg:label,loc:'',stack:data?JSON.stringify(data).slice(0,400):''})
}

// Render sayacı
function diagRender(){
  window.DIAG_PERF.renders++;
  window.DIAG_PERF.lastRender=new Date().toLocaleString('tr-TR')
}

function gSeas(){const m=new Date().getMonth();if(m>=2&&m<=4)return'spring';if(m>=5&&m<=7)return'summer';if(m>=8&&m<=10)return'autumn';return'winter'}
function isSeas(r){const s=SEASONS[gSeas()];return(r.ig||[]).some(ig=>s.some(sv=>ig.toLowerCase().includes(sv)))}
function seasLbl(){return{spring:'🌸 İlkbahar',summer:'☀️ Yaz',autumn:'🍂 Sonbahar',winter:'❄️ Kış'}[gSeas()]}

function recentR(){const now=new Date(),two=new Date(now);two.setDate(now.getDate()-14);const used=new Set();Object.entries(S.M||{}).forEach(([dt,m])=>{try{if(new Date(dt)>=two){if(m.k)used.add(m.k);if(m.a)used.add(m.a)}}catch{}});return used}

function checkDamDaily(){
  const today=tISO();
  const last=S.D.lastDate||today;
  if(last>=today)return;
  // Geçen gün sayısı
  const diff=Math.floor((new Date(today)-new Date(last))/864e5);
  if(diff<=0)return;
  const rate=S.D.dailyRate!=null?S.D.dailyRate:20;
  const drop=diff*rate;
  S.D.l1=Math.max(0,Math.round((S.D.l1!=null?S.D.l1:80)-drop));
  S.D.l2=Math.max(0,Math.round((S.D.l2!=null?S.D.l2:60)-drop));
  S.D.lastDate=today;
  sv('D');
}

function haftalikOzetH(){
var bugun=new Date();var gunler=[];
for(var i=0;i<7;i++){var d=new Date(bugun);d.setDate(bugun.getDate()-bugun.getDay()+1+i);gunler.push(d.toISOString().slice(0,10));}
var menuPlanlanan=gunler.filter(function(g){var m=S.M[g]||{};return m.a||m.k||m.sp;}).length;
var simdi=new Date();var ay=simdi.getMonth();var yil=simdi.getFullYear();
var aylikHarcama=0;if(S.GIDER){aylikHarcama=S.GIDER.filter(function(g){var d=new Date(g.dt);return d.getMonth()===ay&&d.getFullYear()===yil;}).reduce(function(s,g){return s+g.amt;},0);}
var bekleyenSosyal=0;if(S.SOSYAL&&S.SOSYAL.aktiviteler){bekleyenSosyal=S.SOSYAL.aktiviteler.filter(function(a){return!a.tamamlandi;}).length;}
var menuPct=Math.round((menuPlanlanan/7)*100);
return '<div class="cd" style="background:linear-gradient(135deg,var(--primary),#7D3C98);color:#fff;margin-bottom:12px;cursor:pointer" onclick="go(\'yillik\')">'+
'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
'<span style="font-family:Fraunces,serif;font-size:14px;font-weight:800">Bu Hafta</span>'+
'<span style="font-size:10px;opacity:.7">Özet için dokun →</span></div>'+
'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'+
'<div style="background:rgba(255,255,255,.15);border-radius:10px;padding:10px;text-align:center">'+
'<div style="font-size:26px;font-weight:900">'+menuPlanlanan+'/7</div>'+
'<div style="width:100%;height:4px;background:rgba(255,255,255,.25);border-radius:2px;margin:5px 0 4px"><div style="width:'+menuPct+'%;height:100%;background:#fff;border-radius:2px"></div></div>'+
'<div style="font-size:9px;opacity:.8">Ηaftalık Menü</div></div>'+
'<div style="background:rgba(255,255,255,.15);border-radius:10px;padding:10px;text-align:center">'+
'<div style="font-size:26px;font-weight:900">'+bekleyenSosyal+'</div>'+
'<div style="font-size:9px;opacity:.8;margin-top:9px">Bekleyen Aktivite</div></div>'+
'<div style="background:rgba(255,255,255,.15);border-radius:10px;padding:10px;text-align:center">'+
'<div style="font-size:16px;font-weight:900;margin-top:2px">'+fmt(aylikHarcama)+'</div>'+
'<div style="font-size:9px;opacity:.8;margin-top:5px">Aylık Harcama</div></div>'+
'</div></div>';}

function yillikH(){
var yil=new Date().getFullYear();
var yillikHarcama=0;var katHarcama={};
if(S.GIDER){S.GIDER.filter(function(g){return new Date(g.dt).getFullYear()===yil;}).forEach(function(g){yillikHarcama+=g.amt;katHarcama[g.cat]=(katHarcama[g.cat]||0)+g.amt;});}
var topKatlar=Object.entries(katHarcama).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
var aylikH=Array(12).fill(0);
if(S.GIDER){S.GIDER.filter(function(g){return new Date(g.dt).getFullYear()===yil;}).forEach(function(g){aylikH[new Date(g.dt).getMonth()]+=g.amt;});}
var maxAy=Math.max.apply(null,aylikH)||1;
var ay=['Oca','\u015eub','Mar','Nis','May','Haz','Tem','\u0130\u00f6n','Eyl','Eki','Kas','Ara'];
var aktiviteSayisi=0;var puanOrt=0;
if(S.SOSYAL&&S.SOSYAL.aktiviteler){var tamam=S.SOSYAL.aktiviteler.filter(function(a){return a.tamamlandi;});aktiviteSayisi=tamam.length;if(tamam.length>0)puanOrt=Math.round(tamam.reduce(function(s,a){return s+((a.puan_gorkem||0)+(a.puan_esra||0))/2;},0)/tamam.length);}
hedefInitCheck();var tamamH=S.HEDEF.liste.filter(function(h){return h.tamamlandi;}).length;var devamH=S.HEDEF.liste.filter(function(h){return!h.tamamlandi;}).length;
var bakimSayisi=0;if(S.C&&S.C.hs)bakimSayisi=S.C.hs.filter(function(h){return new Date(h.dt).getFullYear()===yil;}).length;
var vetSayisi=0;if(S.PET&&S.PET.vi){var tum=[].concat(S.PET.vi.waffle||[],S.PET.vi.mayis||[]);vetSayisi=tum.filter(function(v){return new Date(v.dt).getFullYear()===yil;}).length;}

};

'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
'<h3 style="margin:0">🔬 Diagnostics</h3>'+
'<div style="display:flex;gap:6px">'+
'<button style="font-size:10px;padding:5px 10px;border-radius:8px;border:1px solid var(--brd);background:var(--bg);cursor:pointer;font-family:Nunito;font-weight:700" onclick="diagKopyala()">📋 Kopyala</button>'+
'<button style="font-size:10px;padding:5px 10px;border-radius:8px;border:1px solid var(--dangerL);background:var(--dangerL);color:var(--danger);cursor:pointer;font-family:Nunito;font-weight:700" onclick="window.DIAG_LOG=[];try{sessionStorage.removeItem(\'eray-diag\')}catch(e){}rn()">Temizle</button>'+
'</div></div>'+
// Sistem özeti
'<div style="background:var(--bg);border-radius:10px;padding:10px;margin-bottom:10px">'+
'<div style="font-size:9px;font-weight:800;color:var(--txtL);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">📊 SİSTEM DURUMU</div>'+
Object.entries(summary).map(([k,v])=>
'<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--brd);font-size:10px">'+
'<span style="color:var(--txtL);font-weight:700">'+k+'</span>'+
'<span style="font-weight:700;color:'+(v.includes('🔴')||/Eksik: [1-9]/.test(v)?'var(--danger)':v.includes('🟢')?'var(--sec)':'var(--txt)')+'">'+v+'</span></div>').join('')+
'</div>'+
// Hata logu
(log.length===0?
'<div style="text-align:center;padding:16px;color:var(--sec);font-size:12px;font-weight:700">✅ Hiç hata yakalanmadı!<br><span style="font-size:10px;color:var(--txtL);font-weight:400">Bu session boyunca log temiz</span></div>':

log.slice(0,15).map(l=>'<div style="background:'+(l.type&&l.type.includes('🔴')?'var(--dangerL)':l.type&&l.type.includes('🟠')?'var(--warnL)':'var(--pL)')+';border-radius:8px;padding:8px;margin-bottom:6px;font-size:10px">'+
'<div style="display:flex;justify-content:space-between;margin-bottom:3px">'+
'<span style="font-weight:800">'+esc(l.type||'İz')+'</span>'+
'<span style="color:var(--txtL);font-size:9px">'+esc(l.ts)+'</span>'+
'</div>'+
'<div style="font-weight:700;word-break:break-all">'+esc(l.msg)+'</div>'+
(l.loc?'<div style="color:var(--txtL);font-size:9px;margin-top:2px">📍 '+esc(l.loc)+'</div>':'')+
(l.stack?'<details style="margin-top:4px"><summary style="font-size:9px;cursor:pointer;color:var(--txtL)">Stack trace</summary><pre style="font-size:8px;white-space:pre-wrap;margin-top:4px;word-break:break-all;opacity:.8">'+esc(l.stack)+'</pre></details>':'')+
'</div>').join('')+
(log.length>15?'<p style="font-size:10px;text-align:center;color:var(--txtL)">+'+(log.length-15)+' daha (kopyala ile hepsini al)</p>':''))+
'</div>'}

const txt=[
'=== ERAYLAR HANESİ - DİAGNOSTİCS RAPORU ===',

].join('\n');

function tsh(id){const item=S.SH.find(i=>i.id===id);if(!item)return;
if(item.dn){item.dn=false;sv('SH');rn();return;}
// Ürün işaretlenince nereden aldın? sor
const e=document.createElement('div');e.className='mo';e.onclick=()=>e.remove();
const mkList=(S.SE.mk||['BİM','Migros','A101']).join(',');e.innerHTML='<div class="md" onclick="event.stopPropagation()" style="padding:16px"><div style="font-size:28px;text-align:center;margin-bottom:6px">🛍️</div><h3 style="text-align:center;margin-bottom:6px">Alındı!</h3><p style="font-size:11px;color:var(--txtL);text-align:center;margin-bottom:12px"><strong>'+esc(item.nm)+'</strong></p><div style="margin-bottom:10px"><label style="font-size:11px;color:var(--txtL);font-weight:700">Miktar</label><input id="tsh_qt" value="'+esc(item.qt)+'" style="width:100%;margin-top:4px;text-align:center;font-size:14px;font-weight:700"></div><div style="display:flex;gap:6px;margin-bottom:10px"><div style="flex:1"><label style="font-size:11px;color:var(--txtL);font-weight:700">Fiyat (₺)</label><input id="tsh_pr" type="number" value="'+(item.pr||'')+'" placeholder="0.00" style="width:100%;margin-top:4px;text-align:center;font-size:14px;font-weight:700"></div><div style="flex:1"><label style="font-size:11px;color:var(--txtL);font-weight:700">Nereye?</label><select id="tsh_loc" style="width:100%;margin-top:4px;padding:9px 6px;font-size:12px"><option value="">'+(item.loc==='buz'?'':'')+'Kaydetme</option><option value="buz"'+(item.loc==='buz'?' selected':'')+'>🧊 Buzdolabı</option><option value="kil"'+(item.loc==='kil'?' selected':'')+'>🧹 Kiler</option></select></div></div><div style="margin-bottom:14px"><label style="font-size:11px;color:var(--txtL);font-weight:700">Market</label><input id="tsh_mk" list="tsh_mklist" value="'+(item.mk||'')+'" placeholder="Market adı..." style="width:100%;margin-top:4px"><datalist id="tsh_mklist">'+(S.SE.mk||['BİM','Migros','A101']).map(m=>'<option value="'+esc(m)+'">').join('')+'</datalist></div><div style="display:flex;gap:8px"><button class="btn bg" onclick="document.querySelector(\'.mo\').remove()" style="flex:1">İptal</button><button class="btn bm" onclick="(()=>{const qt=document.getElementById(\'tsh_qt\').value;const mk=document.getElementById(\'tsh_mk\').value;const pr=parseFloat(document.getElementById(\'tsh_pr\').value)||0;const loc=document.getElementById(\'tsh_loc\').value;document.querySelector(\'.mo\').remove();tshMk('+id+',mk,qt,pr,loc)})()" style="flex:1">✅ Tamam</button></div></div>';
document.body.appendChild(e)}
function tshMk(id,mk,qt,pr,loc){const item=S.SH.find(i=>i.id===id);if(!item)return;
item.dn=true;if(mk)item.mk=mk;if(qt)item.qt=qt;if(pr>0)item.pr=pr;if(loc)item.loc=loc;
// Fiyat → Finans
if(pr>0){
  if(!S.GIDER)S.GIDER=[];
  S.GIDER.push({id:Date.now(),dt:tISO().slice(0,10),amt:pr,cat:'Mutfak Alışveriş',mod:'MUTFAK',desc:(mk?mk+' · ':'')+item.nm,usr:S.user||'Görkem'});
  sv('GIDER');
}
// Stok güncelle
const num=parseFloat((item.qt||'').match(/[\d.]+/)?.[0])||0;
if(!S.PH)S.PH={};if(item.pr>0)S.PH[item.nm.toLowerCase()]=item.pr;
const curLoc=loc||item.loc||'';
if(curLoc==='buz'){
  const fi=S.F.find(f=>f.n.toLowerCase()===item.nm.toLowerCase());
  if(fi){fi.cr=Math.round((fi.cr+(num||1))*10)/10;fi.bt=tISO();sv('F');}
  else{S.F.push({n:item.nm,u:'adet',mn:1,cr:num||1,ic:'📦',ct:'Diğer',br:'',mk:mk||'BİM'});sv('F');}
  toast('🧊 '+item.nm+' buzdolabına kaydedildi','succ');
}else if(curLoc==='kil'){
  const pi=S.P.find(p=>p.n.toLowerCase()===item.nm.toLowerCase());
  if(pi){pi.cr=Math.round((pi.cr+(num||1))*10)/10;pi.bt=tISO();sv('P');}
  else{S.P.push({n:item.nm,u:'adet',mn:1,cr:num||1,ic:'📦',ct:'Diğer',br:'',mk:mk||'BİM'});sv('P');}
  toast('🧹 '+item.nm+' kilere kaydedildi','succ');
}else{
  const fi=S.F.find(f=>f.n.toLowerCase()===item.nm.toLowerCase());
  if(fi){if(num>0)fi.cr=Math.round((fi.cr+num)*10)/10;else fi.cr=Math.max(fi.cr,fi.mn||1);fi.bt=tISO();sv('F');}
}
sv('SH');rn()}
function dsh(id){if(!confirm('Silmek istediğine emin misin?'))return;S.SH=S.SH.filter(i=>i.id!==id);sv('SH');rn()}

function svBitenler(keys){
const mo=document.querySelector('.mo');
if(!S.TK)S.TK={};
let cnt=0;
keys.forEach((combo,i)=>{
const sepIdx=combo.indexOf(':');
const key=combo.slice(0,sepIdx),nm=combo.slice(sepIdx+1);
const cb=document.getElementById('bit_'+i);
if(!cb||!cb.checked)return;
const qInp=document.getElementById('bitq_'+i);
const qty=qInp?Math.max(0,Number(qInp.value)||1):1;
const item=(key==='F'?S.F:key==='DON'?S.DON:S.P).find(x=>x.n===nm);
if(!item)return;
// Stoktan düş (sıfırlama değil — kullanıcının söylediği kadar)
const newCr=Math.max(0,Math.round((item.cr-qty)*10)/10);
const actualUsed=item.cr-newCr;// gerçek düşülen miktar
item.cr=newCr;
// B5: tüketim kaydı — stok sıfırlandıysa süreyi kaydet
if(newCr===0&&item.bt){
const days=Math.max(1,Math.floor((Date.now()-new Date(item.bt))/(864e5)));
if(!S.TK[nm])S.TK[nm]={history:[],avg:0};
S.TK[nm].history.push(days);
if(S.TK[nm].history.length>10)S.TK[nm].history=S.TK[nm].history.slice(-10);
S.TK[nm].avg=Math.round(S.TK[nm].history.reduce((a,b)=>a+b,0)/S.TK[nm].history.length);
item.avgDays=S.TK[nm].avg;item.ft=tISO();}
// Alışverişe ekle (mevcut yoksa)
if(!S.SH.some(s=>s.nm.toLowerCase()===nm.toLowerCase()&&!s.dn)){
const neededQty=item.mn>0?item.mn:qty;
const qt=neededQty+' '+item.u;
S.SH.push({id:Date.now()+Math.random(),nm,qt,mk:item.mk||'BİM',br:item.br||'',pr:0,dn:false,ab:'BİTTİ'});
cnt++;}
});
sv('F');sv('P');sv('DON');sv('SH');sv('TK');
if(mo)mo.remove();
toast(cnt>0?'🛒 '+cnt+' ürün alışverişe eklendi!':'Seçili ürün yok.',cnt>0?'succ':'info');
rn();}
function us(k,n,f,v){const item=S[k].find(x=>x.n===n);if(item){item[f]=v;sv(k);rn()}}
function ds(k,n){
const usedIn=S.R.filter(r=>r.ig&&r.ig.some(i=>i.split(':')[0].trim().toLowerCase()===n.toLowerCase()));
if(usedIn.length>0){
if(!confirm('"'+n+'" şu tariflerde kullanılıyor:\n'+usedIn.map(r=>r.e+' '+r.n).join('\n')+'\n\nYine de silmek istiyor musun?'))return}
else if(!confirm('"'+n+'" silinecek. Emin misin?'))return;
S[k]=S[k].filter(x=>x.n!==n);sv(k);rn()}
function oed(k,n){const f=S[k].find(x=>x.n===n);if(!f)return;const units=['adet','kg','gram','litre','paket','kutu','şişe','demet','kavanoz','poşet'];const e=document.createElement('div');e.className='mo';e.onclick=()=>e.remove();

// Ekmek tazeliği: gün farkına göre durum
function ekTazelik(dt,raf){
  if(!dt)return{renk:'var(--brd)',yazı:'var(--txtL)',etiket:'?',pct:0,icon:'❓'};
  const gun=Math.floor((Date.now()-new Date(dt))/864e5);
  const kalan=Math.max(0,raf-gun);
  const pct=Math.max(0,Math.min(100,Math.round(kalan/raf*100)));
  if(kalan<=0)return{renk:'var(--danger)',yazı:'#791F1F',etiket:'Bayat!',pct:0,icon:'🔴'};
  if(kalan===1)return{renk:'var(--warn)',yazı:'#7D6608',etiket:'Son gün',pct,icon:'🟡'};
  if(pct>=60)return{renk:'var(--succ)',yazı:'#085041',etiket:kalan+' gün',pct,icon:'🟢'};
  return{renk:'var(--warn)',yazı:'#7D6608',etiket:kalan+' gün',pct,icon:'🟡'};
}

// Hızlı 1 adet ekle (bugünün tarihi)
function ekHizliEkle(tip,ic,raf,mk){
  if(!S.EK)S.EK=[];
  // Aynı tip varsa adet artır
  const mevcut=S.EK.find(e=>e.tip===tip&&ekTazelik(e.dt,e.raf).pct>0);
  if(mevcut){mevcut.adet=(mevcut.adet||1)+1;}
  else{S.EK.push({id:Date.now(),tip,ic,raf,mk,adet:1,dt:tISO()});}
  sv('EK');toast('🍞 '+tip+' eklendi!','succ',2000);rn();
}

function svEkEkle(){
  const combo=document.getElementById('ek_tip').value.split('|');
  let tip=combo[0],ic=combo[1],raf=Number(combo[2]),mk=combo[3];
  // Özel ekmek türü
  if(tip==='__ozel__'){
    tip=document.getElementById('ek_ozel_nm').value.trim();
    if(!tip){toast('Ekmek adı gir!','warn');return;}
    ic='🍞';
    raf=Math.max(1,Number(document.getElementById('ek_ozel_raf').value)||7);
    // Özel türü listeye kalıcı ekle
    if(!EKMEK_TIPLER.find(t=>t.tip===tip)){
      EKMEK_TIPLER.splice(EKMEK_TIPLER.length-1,0,{tip,ic,raf,mk,not:'Özel tür'});
    }
  }
  const adet=Math.max(1,Number(document.getElementById('ek_adet_n').textContent)||1);
  const dt=document.getElementById('ek_dt').value||tISO();
  if(!S.EK)S.EK=[];
  S.EK.push({id:Date.now(),tip,ic,raf,mk,adet,dt});
  sv('EK');document.querySelector('.mo').remove();
  toast('🍞 '+tip+' eklendi!','succ');rn();
}

// Adet azalt / artır
function ekAdet(idx,delta){
  if(!S.EK||!S.EK[idx])return;
  S.EK[idx].adet=Math.max(0,(S.EK[idx].adet||1)+delta);
  if(S.EK[idx].adet===0)S.EK.splice(idx,1);
  sv('EK');rn();
}

// Ekmek sil
function ekSil(idx){
  if(!S.EK)return;
  S.EK.splice(idx,1);sv('EK');rn();
}

// Bayatları temizle
function ekSilBayatlar(){
  if(!S.EK)return;
  S.EK=S.EK.filter(e=>ekTazelik(e.dt,e.raf).pct>0);

}

function tatLoadWeather(city,country){
var el=document.getElementById('tat-weather');if(!el)return;
var q=encodeURIComponent((city+' '+country).trim());
fetch('https://nominatim.openstreetmap.org/search?q='+q+'&format=json&limit=1&accept-language=tr')
.then(function(r){return r.json();}).then(function(data){if(!data||!data[0])throw new Error('');
var lat=data[0].lat,lon=data[0].lon;
return fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&forecast_days=5');
}).then(function(r){return r.json();}).then(function(w){
if(!w||!w.daily)throw new Error('');
var ico=function(c){if(c<=1)return'☀️';if(c<=3)return'⛅';if(c<=48)return'🌫️';if(c<=67)return'🌧️';if(c<=77)return'❄️';return'⛈️';};
el.innerHTML='<div><div class="fl" style="margin-bottom:8px">🌤️ '+(city||country)+' Hava Durumu (5 Gün)</div>'+
'<div style="display:flex;gap:6px;overflow-x:auto">'+w.daily.time.slice(0,5).map(function(d,i){
return'<div style="flex-shrink:0;background:var(--bg);border-radius:10px;padding:10px;text-align:center;min-width:56px">'+
'<div style="font-size:18px;margin-bottom:3px">'+ico(w.daily.weathercode[i])+'</div>'+
'<div style="font-size:10px;font-weight:700">'+d.slice(5).replace('-','.')+'</div>'+
'<div style="font-size:12px;color:var(--mutfak);font-weight:700">'+Math.round(w.daily.temperature_2m_max[i])+'°</div>'+
'<div style="font-size:10px;color:var(--txtL)">'+Math.round(w.daily.temperature_2m_min[i])+'°</div></div>';}).join('')+'</div></div>';
}).catch(function(){el.innerHTML='<div style="font-size:11px;color:var(--txtL);padding:6px;text-align:center">🌤️ Hava durumu yüklenemedi</div>';});}

function petAd(s,n){var d=petPd(s);d.setDate(d.getDate()+n);return petFmt(d);}
function petTd(){return petFmt(new Date());}
function petAge(s){var b=petPd(s),t=new Date(),mo=(t.getFullYear()-b.getFullYear())*12+t.getMonth()-b.getMonth();if(mo<1)return Math.round((t-b)/864e5)+' günlük';if(mo<12)return mo+' aylık';var y=Math.floor(mo/12),m=mo%12;return m?y+' yaş '+m+' ay':y+' yaş';}

}

function saglikTabSec(t){saglikInitCheck();S.SAGLIK.tab=t;sv('SAGLIK');rn();}

function sgTd(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ─── KALAN GÜN HESABI ────────────────────────────────────────────────────────
function kalanGun(tarih){
if(!tarih)return null;
var t=new Date(tarih);var b=new Date();b.setHours(0,0,0,0);
var fark=Math.round((t-b)/(1000*60*60*24));
return fark;
}

// ─── UYARI BADGE ─────────────────────────────────────────────────────────────
function kalanBadge(gun){
if(gun===null)return '';
if(gun<0)return '<span class="badge" style="background:#FDEDEC;color:#E74C3C">Geçti</span>';
if(gun===0)return '<span class="badge" style="background:#FEF9E7;color:#F39C12">Bugün!</span>';
if(gun<=3)return '<span class="badge" style="background:#FEF9E7;color:#F39C12">'+gun+' gün</span>';
if(gun<=7)return '<span class="badge" style="background:#EDE0F5;color:#9B59B6">'+gun+' gün</span>';
return '<span class="badge" style="background:var(--sL);color:var(--sec)">'+gun+' gün</span>';
}

// ─── ÖLÇÜM SEKMESİ ────────────────────────────────────────────────────────────
function saglikOlcumH(){
var list=S.SAGLIK.olcumler||[];
if(list.length===0){
return '<div class="cd" style="text-align:center;padding:28px"><div style="font-size:40px">📊</div><p style="color:var(--txtL);margin-top:8px;font-size:13px">Henüz ölçüm eklenmedi</p></div>';
}

// Kilo grupla
var kiloG=list.filter(function(o){return o.tip==='Kilo';});
var tanG=list.filter(function(o){return o.tip==='Tansiyon';});
var kanG=list.filter(function(o){return o.tip==='Kan Şekeri';});
var digerG=list.filter(function(o){return o.tip!=='Kilo'&&o.tip!=='Tansiyon'&&o.tip!=='Kan Şekeri';});

function olcumGrupH(baslik,icon,grup){
if(grup.length===0)return '';
grup.sort(function(a,b){return b.tarih.localeCompare(a.tarih);});
var son=grup[0];
var out='<div class="cd" style="margin-bottom:10px">';
out+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
out+='<div style="font-weight:800;font-size:13px">'+icon+' '+baslik+'</div>';
out+='<div style="font-size:11px;color:var(--txtL)">Son: <b>'+son.deger+'</b> · '+son.tarih+'</div></div>';
if(grup.length>1){
var chartData=grup.slice(0,8).reverse();
var vals=chartData.map(function(o){return parseFloat(o.deger)||0;});
var mx=Math.max.apply(null,vals);var mn=Math.min.apply(null,vals);
var rng=mx-mn||1;
out+='<div style="display:flex;align-items:flex-end;gap:3px;height:40px;margin-bottom:6px">';
vals.forEach(function(v,i){
var h=Math.round(((v-mn)/rng)*34)+4;
out+='<div title="'+chartData[i].tarih+': '+v+'" style="flex:1;background:linear-gradient(180deg,#16A085,#0E6655);border-radius:3px 3px 0 0;height:'+h+'px;min-width:6px"></div>';
});
out+='</div>';
}
out+='<div style="display:flex;flex-direction:column;gap:3px">';
grup.slice(0,3).forEach(function(o){
out+='<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--brd)">';
out+='<span>'+(o.kisi==='Görkem'?'👨 ':'👩 ')+o.tarih+'</span>';
out+='<div style="display:flex;align-items:center;gap:8px"><b>'+o.deger+'</b><button class="del" onclick="sgOlcumSil('+o.id+')">🗑</button></div>';
out+='</div>';
});
out+='</div></div>';
return out;
}

var out='';
out+=olcumGrupH('Kilo','⚖️',kiloG);
out+=olcumGrupH('Tansiyon','❤️',tanG);
out+=olcumGrupH('Kan Şekeri','🩸',kanG);
digerG.forEach(function(o){
out+=olcumGrupH(o.tip,'📏',[o]);
});
return out;
}

function avListeH(){

var liste=S.ALISVERIS.liste||[];
var bekleyen=liste.filter(function(i){return!i.tamamlandi;});
var tamamlanan=liste.filter(function(i){return i.tamamlandi;});
function oncelikRenk(o){return o==='Yüksek'?'var(--danger)':o==='Normal'?'var(--warn)':'var(--txtL)';}
function oncelikIco(o){return o==='Yüksek'?'🔴':o==='Normal'?'🟡':'🟢';}
function itemRow(item){
return'<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd)'+(item.tamamlandi?';opacity:.5':'')+'">'+
'<input type="checkbox"'+(item.tamamlandi?' checked':'')+' onchange="avTamamla('+item.id+')" style="accent-color:var(--acc);width:18px;height:18px;cursor:pointer;flex-shrink:0">'+
'<div style="flex:1">'+
'<div style="font-size:13px;font-weight:700;'+(item.tamamlandi?'text-decoration:line-through;color:var(--txtL)':'')+'">'+esc(item.baslik)+'</div>'+
'<div style="font-size:10px;color:var(--txtL);margin-top:2px">'+
'<span style="color:'+oncelikRenk(item.oncelik)+'">'+oncelikIco(item.oncelik)+' '+esc(item.oncelik)+'</span>'+
' · <span style="background:var(--bg);padding:2px 6px;border-radius:6px;font-size:9px;font-weight:700">'+esc(item.kategori)+'</span>'+
(item.tahminiF?(' · 💰 '+item.tahminiF+' ₺'):'')+(item.kisi?' · '+(item.kisi==='Görkem'?'👨':'👩')+' '+esc(item.kisi):'')+'</div>'+
(item.not?('<div style="font-size:10px;color:var(--txtL);margin-top:2px;font-style:italic">'+esc(item.not)+'</div>'):'')+'</div>'+
'<button class="del" onclick="avSil('+item.id+')">✕</button></div>';}

var out='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
'<h2 style="margin:0">🛍️ Alışveriş Listesi</h2>'+
'<button class="btn bp" style="width:auto;padding:8px 14px;font-size:12px" onclick="avMEkle()">+ Ekle</button></div>';

if(bekleyen.length===0&&tamamlanan.length===0){
out+='<div class="cd" style="text-align:center;padding:24px"><div style="font-size:36px;margin-bottom:8px">🛍️</div><div style="font-size:13px;font-weight:700;color:var(--txtL)">Liste boş!</div><div style="font-size:11px;color:var(--txtL);margin-top:4px">Yukarıdan ürün ekle</div></div>';
return out;}

if(bekleyen.length>0){
var yuksek=bekleyen.filter(function(i){return i.oncelik==='Yüksek';});
var normal=bekleyen.filter(function(i){return i.oncelik==='Normal';});
var dusuk=bekleyen.filter(function(i){return i.oncelik==='Düşük'||!i.oncelik;});
out+='<div style="font-size:11px;color:var(--txtL);margin-bottom:8px;font-weight:700">'+bekleyen.length+' ürün bekliyor</div>';
out+='<div class="cd" style="padding:8px 14px">';
[{list:yuksek,label:'🔴 Yüksek Öncelik'},{list:normal,label:'🟡 Normal'},{list:dusuk,label:'🟢 Düşük'}].forEach(function(g){
if(g.list.length>0){out+='<div style="font-size:9px;font-weight:800;color:var(--txtL);text-transform:uppercase;letter-spacing:.5px;padding:8px 0 2px">'+g.label+'</div>';
g.list.forEach(function(i){out+=itemRow(i);});}});
out+='</div>';}

if(tamamlanan.length>0){
out+='<div class="cd" style="padding:8px 14px;margin-top:8px"><div style="font-size:9px;font-weight:800;color:var(--txtL);text-transform:uppercase;letter-spacing:.5px;padding:4px 0 8px">✅ Tamamlananlar ('+tamamlanan.length+')</div>';
tamamlanan.forEach(function(i){out+=itemRow(i);});
out+='<button onclick="avArsiveAt()" style="width:100%;margin-top:8px;padding:8px;background:var(--sL);border:none;border-radius:10px;font-size:11px;font-weight:700;color:var(--sec);cursor:pointer;font-family:Nunito">📦 Tamamlananları Arşivle</button>';
out+='</div>';}
return out;}

// ─── MODARİNG SEKMESİ ─────────────────────────────────────────────────────────
function avModaringH(){
alisverisInitCheck();
var liste=S.ALISVERIS.liste||[];
var modaring=liste.filter(function(i){return i.kategori==='Modaring';});

var out='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
'<h2 style="margin:0">💎 Modaring</h2>'+
'<button class="btn" style="width:auto;padding:8px 14px;font-size:12px;background:linear-gradient(135deg,#E67E22,#CA6F1E);color:#fff" onclick="avMModaringEkle()">+ Ürün Ekle</button></div>';

out+='<div class="cd" style="background:linear-gradient(135deg,rgba(230,126,34,.1),rgba(202,111,30,.05));border-color:rgba(230,126,34,.3);margin-bottom:12px"><div style="font-size:10px;font-weight:800;color:#E67E22;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">📊 ÖZET</div>';
var toplamAliniyor=bekleyen.reduce(function(s,i){return s+(parseFloat(i.alisF)||0);},0);
var toplamSatilan=tamamlanan.reduce(function(s,i){return s+(parseFloat(i.satisF)||0);},0);
var toplamMaliyet=tamamlanan.reduce(function(s,i){return s+(parseFloat(i.alisF)||0);},0);
var kar=toplamSatilan-toplamMaliyet;
out+='<div class="g3"><div style="text-align:center;padding:6px"><div style="font-size:16px;font-weight:800;color:#E67E22">'+bekleyen.length+'</div><div style="font-size:9px;color:var(--txtL)">Bekleyen</div></div>';
out+='<div style="text-align:center;padding:6px"><div style="font-size:16px;font-weight:800;color:'+(kar>=0?'var(--sec)':'var(--danger)')+'">'+kar.toLocaleString('tr-TR')+'₺</div><div style="font-size:9px;color:var(--txtL)">Net Kâr</div></div>';
out+='<div style="text-align:center;padding:6px"><div style="font-size:16px;font-weight:800;color:var(--primary)">'+tamamlanan.length+'</div><div style="font-size:9px;color:var(--txtL)">Satıldı</div></div></div></div>';

if(bekleyen.length===0&&tamamlanan.length===0){
out+='<div class="cd" style="text-align:center;padding:24px"><div style="font-size:36px;margin-bottom:8px">💎</div><div style="font-size:13px;font-weight:700;color:var(--txtL)">Modaring stoku boş</div><div style="font-size:11px;color:var(--txtL);margin-top:4px">Alınacak ürünleri ekle</div></div>';
return out;}

function modaringRow(item){
return'<div style="padding:10px 0;border-bottom:1px solid var(--brd)">' +
'<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
'<div style="flex:1"><div style="font-size:13px;font-weight:700;'+(item.tamamlandi?'text-decoration:line-through;color:var(--txtL)':'')+'">'+esc(item.baslik)+'</div>'+
'<div style="font-size:10px;color:var(--txtL);margin-top:2px">'+
(item.alisF?'Alış: <b style="color:var(--danger)">'+item.alisF+'₺</b> ':'')+(item.satisF?'· Satış: <b style="color:var(--sec)">'+item.satisF+'₺</b> ':'')+
(item.stok?'· Stok: <b>'+item.stok+'</b>':'')+
'</div>'+
(item.not?('<div style="font-size:10px;color:var(--txtL);margin-top:2px;font-style:italic">'+esc(item.not)+'</div>'):'')+
'</div>'+
'<div style="display:flex;gap:6px;align-items:center">'+
(!item.tamamlandi?('<button onclick="avModaringSat('+item.id+')" style="padding:5px 10px;border:none;border-radius:8px;background:var(--sL);color:var(--sec);font-size:10px;font-weight:700;cursor:pointer;font-family:Nunito">Satıldı ✓</button>'):'<span style="font-size:10px;color:var(--sec);font-weight:700">✅</span>')+
'<button class="del" onclick="avSil('+item.id+')">✕</button></div></div></div>';}

if(bekleyen.length>0){
out+='<div class="cd" style="padding:8px 14px"><div style="font-size:9px;font-weight:800;color:var(--txtL);text-transform:uppercase;letter-spacing:.5px;padding:4px 0 8px">📦 Alınacaklar / Stok ('+bekleyen.length+')</div>';
bekleyen.forEach(function(i){out+=modaringRow(i);});
out+='</div>';}
if(tamamlanan.length>0){
out+='<div class="cd" style="padding:8px 14px;margin-top:8px"><div style="font-size:9px;font-weight:800;color:var(--txtL);text-transform:uppercase;letter-spacing:.5px;padding:4px 0 8px">✅ Satılanlar ('+tamamlanan.length+')</div>';

return out;}

e.innerHTML='<div class="md" onclick="event.stopPropagation()"><h3>💎 Modaring Ürün Ekle</h3><div class="fc">'+
'<div><div class="fl">Ürün Adı *</div><input id="avmad" placeholder="ör: Gümüş Kolye, Taş Küpe..."></div>'+

'<div><div class="fl">Stok Miktarı</div><input id="avmstok" type="number" placeholder="1" value="1"></div>'+
'<div><div class="fl">Not</div><input id="avmnot" placeholder="Tedarikçi, ürün kodu..."></div>'+

function avModaringKaydet(){
var ad=document.getElementById('avmad').value;
if(!ad){toast('Ürün adı zorunlu!','warn');return;}
alisverisInitCheck();
S.ALISVERIS.liste.push({
id:Date.now(),
baslik:ad,
kategori:'Modaring',
oncelik:'Normal',
alisF:document.getElementById('avmalis').value,
satisF:document.getElementById('avmsatis').value,
stok:document.getElementById('avmstok').value,
not:document.getElementById('avmnot').value,
tamamlandi:false,
dt:tISO()
});
sv('ALISVERIS');
var m=document.querySelector('.mo');if(m)m.remove();
toast('Modaring ürünü eklendi!','succ');rn();}

function avTamamla(id){
alisverisInitCheck();
S.ALISVERIS.liste=S.ALISVERIS.liste.map(function(i){
return i.id==id?Object.assign({},i,{tamamlandi:!i.tamamlandi,tamamlanmaTarihi:tISO()}):i;});
sv('ALISVERIS');rn();}

function avModaringSat(id){
alisverisInitCheck();
S.ALISVERIS.liste=S.ALISVERIS.liste.map(function(i){
return i.id==id?Object.assign({},i,{tamamlandi:true,tamamlanmaTarihi:tISO()}):i;});
sv('ALISVERIS');toast('Satıldı olarak işaretlendi!','succ');rn();}

function avSil(id){
alisverisInitCheck();
S.ALISVERIS.liste=S.ALISVERIS.liste.filter(function(i){return i.id!=id;});
sv('ALISVERIS');rn();}

function avArsiveAt(){
alisverisInitCheck();
var tamamlananlar=S.ALISVERIS.liste.filter(function(i){return i.tamamlandi;});
if(tamamlananlar.length===0)return;
S.ALISVERIS.arsiv.push({tarih:new Date().toLocaleDateString('tr-TR'),urunler:tamamlananlar});
if(S.ALISVERIS.arsiv.length>50)S.ALISVERIS.arsiv=S.ALISVERIS.arsiv.slice(-50);
S.ALISVERIS.liste=S.ALISVERIS.liste.filter(function(i){return!i.tamamlandi;});
sv('ALISVERIS');toast(''+tamamlananlar.length+' ürün arşivlendi!','succ');rn();}

function avArsivTemizle(){
alisverisInitCheck();
S.ALISVERIS.arsiv=[];
sv('ALISVERIS');toast('Arşiv temizlendi!','succ');rn();}

function sosyalInitCheck(){
if(!S.SOSYAL)S.SOSYAL={rutinler:[],aktiviteler:[],havuz:[],tab:'hafta'};
if(!S.SOSYAL.rutinler)S.SOSYAL.rutinler=[];
if(!S.SOSYAL.aktiviteler)S.SOSYAL.aktiviteler=[];
if(!S.SOSYAL.havuz)S.SOSYAL.havuz=[];
if(!S.SOSYAL.tab)S.SOSYAL.tab='hafta';}

function sosyalH(){
sosyalInitCheck();
var tab=S.SOSYAL.tab||'hafta';
var tabs=[{id:'hafta',ic:'📅',l:'Bu Hafta'},{id:'rutinler',ic:'🏋️',l:'Rutinler'},{id:'arsiv',ic:'📊',l:'Arşiv'},{id:'havuz',ic:'💡',l:'Havuz'}];
var fn;
if(tab==='hafta')fn=sosyalHaftaH;
else if(tab==='rutinler')fn=sosyalRutinH;
else if(tab==='arsiv')fn=sosyalArsivH;
else fn=sosyalHavuzH;
return'<div class="app"><div class="hdr" style="background:linear-gradient(135deg,#E91E63,#AD1457)"><div style="display:flex;align-items:center;gap:8px"><div style="font-size:14px;color:rgba(255,255,255,.7);cursor:pointer" onclick="go(\'home\')">◀</div><div><h1>Eraylar Sosyal</h1><small>Aktivite & Rutin & Havuz</small></div></div><div style="display:flex;gap:6px;align-items:center">'+onlineDot()+'<button class="ubtn" onclick="pu(null)">'+(S.user==='Görkem'?'👨':'👩')+' '+S.user+'</button></div></div><div class="cnt fi">'+fn()+'</div><div class="nav">'+tabs.map(function(t){return'<button class="'+(tab===t.id?'on':'')+'" onclick="S.SOSYAL.tab=\''+t.id+'\';rn()"><span class="ico">'+t.ic+'</span><span class="lbl" style="color:'+(tab===t.id?'#E91E63':'var(--txtL)')+'">'+t.l+'</span>'+(tab===t.id?'<span class="dot" style="background:#E91E63"></span>':'')+'</button>';}).join('')+'</div></div>';}

// ─── BU HAFTA SEKMESİ ────────────────────────────────────────────────────────
function sosyalHaftaH(){
sosyalInitCheck();
var now=new Date();
var dayOfWeek=now.getDay();var diff=dayOfWeek===0?6:dayOfWeek-1;
var weekStart=new Date(now);weekStart.setDate(now.getDate()-diff);
var weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);
var ws=weekStart.toISOString().slice(0,10);var we=weekEnd.toISOString().slice(0,10);

var planned=S.SOSYAL.aktiviteler.filter(function(a){return a.tarih>=ws&&a.tarih<=we&&!a.tamamlandi;});
var done=S.SOSYAL.aktiviteler.filter(function(a){return a.tarih>=ws&&a.tarih<=we&&a.tamamlandi;});

var out='<h2>📅 Bu Hafta</h2>';
out+='<div style="font-size:11px;color:var(--txtL);margin-bottom:14px">'+weekStart.toLocaleDateString('tr-TR',{day:'numeric',month:'short'})+' — '+weekEnd.toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'})+'</div>';

// Planlanan aktiviteler
if(planned.length>0){
out+='<div class="cd"><h3>🎯 Planlanan ('+planned.length+')</h3>';
planned.forEach(function(a){
out+='<div class="si" style="padding:10px 0;cursor:pointer" onclick="sosyalDetay('+a.id+')">';
out+='<div style="font-size:22px;min-width:36px;text-align:center">'+(a.tur==='evde'?'🏠':'🌆')+'</div>';
out+='<div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(a.baslik)+'</div>';
out+='<div style="font-size:10px;color:var(--txtL)">'+new Date(a.tarih).toLocaleDateString('tr-TR',{weekday:'short',day:'numeric',month:'short'})+(a.mekan?' · '+esc(a.mekan):'')+'</div></div>';
out+='<button style="background:var(--sL);color:var(--sec);border:none;border-radius:8px;padding:5px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:Nunito" onclick="event.stopPropagation();sosyalTamamla('+a.id+')">✓</button>';
out+='</div>';});
out+='</div>';
}else{
// Havuzdan öneri
var havuz=S.SOSYAL.havuz.filter(function(h){return!h.yapildi;});
out+='<div class="cd" style="text-align:center;padding:24px"><div style="font-size:40px;margin-bottom:8px">🤔</div>';
out+='<div style="font-weight:700;margin-bottom:6px">Bu hafta plan yok!</div>';
if(havuz.length>0){
var rand=havuz[Math.floor(Math.random()*havuz.length)];
out+='<div style="font-size:12px;color:var(--txtL);margin-bottom:10px">Havuzdan öneri:</div>';
out+='<div style="background:var(--pL);padding:12px;border-radius:12px;margin-bottom:10px"><div style="font-weight:700;font-size:14px">'+esc(rand.baslik)+'</div>';
if(rand.tur)out+='<div style="font-size:10px;color:var(--txtL);margin-top:4px">'+(rand.tur==='evde'?'🏠 Evde':'🌆 Dışarı')+'</div>';
out+='</div>';
out+='<button class="btn" style="background:#E91E63;color:#fff;font-size:12px" onclick="sosyalHavuzdanPlanla('+rand.id+')">📅 Bu Hafta Planla</button>';
}else{
out+='<div style="font-size:12px;color:var(--txtL)">Havuza fikir ekleyin!</div>';
}
out+='</div>';}

// Tamamlananlar
if(done.length>0){
out+='<div class="cd"><h3>✅ Yapıldı ('+done.length+')</h3>';
done.forEach(function(a){
out+='<div class="si" style="padding:10px 0;opacity:.7;cursor:pointer" onclick="sosyalDetay('+a.id+')">';
out+='<div style="font-size:22px;min-width:36px;text-align:center">'+(a.tur==='evde'?'🏠':'🌆')+'</div>';
out+='<div style="flex:1"><div style="font-weight:700;font-size:13px;text-decoration:line-through">'+esc(a.baslik)+'</div>';
out+='<div style="font-size:10px;color:var(--txtL)">'+new Date(a.tarih).toLocaleDateString('tr-TR',{weekday:'short',day:'numeric',month:'short'})+'</div></div>';
var pg=(a.puan_gorkem||0);var pe=(a.puan_esra||0);
if(pg||pe)out+='<div style="font-size:10px;text-align:center"><div>👨 '+pg+'/5</div><div>👩 '+pe+'/5</div></div>';
out+='</div>';});
out+='</div>';}

out+='<button class="btn" style="background:#E91E63;color:#fff;margin-top:8px" onclick="sosyalAktiviteEkle()">+ Aktivite Planla</button>';
return out;}

// ─── RUTİNLER SEKMESİ ────────────────────────────────────────────────────────
function sosyalRutinH(){
sosyalInitCheck();
var rutinler=S.SOSYAL.rutinler||[];
var gunler=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
var out='<h2>🏋️ Rutinler</h2>';

if(rutinler.length===0){
out+='<div class="cd" style="text-align:center;padding:24px"><div style="font-size:40px;margin-bottom:8px">🏃</div>';
out+='<div style="font-weight:700;margin-bottom:6px">Henüz rutin eklenmedi</div>';
out+='<div style="font-size:12px;color:var(--txtL)">Spor, hobi veya düzenli aktiviteler</div></div>';
}else{
rutinler.forEach(function(r){
out+='<div class="cd" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
out+='<div><div style="font-weight:800;font-size:14px">'+esc(r.aktivite)+'</div>';
out+='<div style="font-size:11px;color:var(--txtL)">'+(r.kisi==='Görkem'?'👨':'👩')+' '+esc(r.kisi)+(r.ucret?' · '+fmt(r.ucret)+'/ay':'')+'</div></div>';
out+='<button class="del" onclick="sosyalRutinSil('+r.id+')">🗑️</button></div>';

// Gün chip'leri
out+='<div style="display:flex;gap:4px;flex-wrap:wrap">';
gunler.forEach(function(g,idx){
var aktif=(r.gunler||[]).indexOf(idx)>=0;
out+='<span style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;background:'+(aktif?'#E91E63':'var(--bg)')+';color:'+(aktif?'#fff':'var(--txtL)')+'">'+g+'</span>';});
out+='</div>';

// Bu hafta takibi
var now=new Date();var dayOfWeek=now.getDay();var diff2=dayOfWeek===0?6:dayOfWeek-1;
var weekKey=new Date(now);weekKey.setDate(now.getDate()-diff2);
var wk=weekKey.toISOString().slice(0,10);
var kayitlar=r.haftalik||{};var hk=kayitlar[wk]||[];
var planliGunSayisi=(r.gunler||[]).length;
var yapilan=hk.length;
if(planliGunSayisi>0){
out+='<div style="margin-top:8px;display:flex;align-items:center;gap:8px">';
out+='<div style="flex:1;height:6px;background:var(--bg);border-radius:3px"><div style="height:100%;width:'+Math.min(100,Math.round(yapilan/planliGunSayisi*100))+'%;background:#E91E63;border-radius:3px"></div></div>';
out+='<span style="font-size:10px;font-weight:700;color:var(--txtL)">'+yapilan+'/'+planliGunSayisi+'</span></div>';

// Bugün gidildi mi?
var bugun=now.getDay();var bugunIdx=bugun===0?6:bugun-1;
if((r.gunler||[]).indexOf(bugunIdx)>=0){
var bugunYapildi=hk.indexOf(bugunIdx)>=0;
out+='<button style="margin-top:8px;padding:6px 14px;border-radius:8px;border:none;font-family:Nunito;font-size:11px;font-weight:700;cursor:pointer;background:'+(bugunYapildi?'var(--sL)':'#E91E63')+';color:'+(bugunYapildi?'var(--sec)':'#fff')+'" onclick="sosyalRutinIsaretle('+r.id+','+bugunIdx+')">'+(bugunYapildi?'✓ Bugün yapıldı':'Bugün gittim')+'</button>';
}}
out+='</div>';});
}

out+='<button class="btn" style="background:#E91E63;color:#fff;margin-top:8px" onclick="sosyalRutinEkle()">+ Rutin Ekle</button>';
return out;}

// ─── ARŞİV SEKMESİ ──────────────────────────────────────────────────────────
function sosyalArsivH(){
sosyalInitCheck();
var tamamlanan=S.SOSYAL.aktiviteler.filter(function(a){return a.tamamlandi;}).sort(function(a,b){return b.tarih>a.tarih?1:-1;});
var tekrarListesi=tamamlanan.filter(function(a){return a.tekrar;});

var out='<h2>📊 Arşiv</h2>';

if(tamamlanan.length===0){
out+='<div class="cd" style="text-align:center;padding:24px"><div style="font-size:40px;margin-bottom:8px">📭</div>';
out+='<div style="font-weight:700">Henüz tamamlanan aktivite yok</div></div>';
return out;}

// İstatistik
var topHarcama=0;var topPG=0;var topPE=0;var puanSayisi=0;
tamamlanan.forEach(function(a){topHarcama+=(a.harcama||0);if(a.puan_gorkem){topPG+=a.puan_gorkem;puanSayisi++;}if(a.puan_esra)topPE+=a.puan_esra;});
out+='<div class="cd"><div class="g3" style="text-align:center">';
out+='<div><div style="font-size:22px;font-weight:800;color:#E91E63">'+tamamlanan.length+'</div><div style="font-size:9px;color:var(--txtL)">Aktivite</div></div>';
out+='<div><div style="font-size:22px;font-weight:800;color:var(--sec)">'+fmt(topHarcama)+'</div><div style="font-size:9px;color:var(--txtL)">Harcama</div></div>';
out+='<div><div style="font-size:22px;font-weight:800;color:var(--primary)">'+(puanSayisi>0?(topPG/puanSayisi).toFixed(1):'—')+'</div><div style="font-size:9px;color:var(--txtL)">Ort. Puan</div></div>';
out+='</div></div>';

// Tekrar listesi
if(tekrarListesi.length>0){
out+='<div class="cd"><h3>🔁 Tekrar Yapalım ('+tekrarListesi.length+')</h3>';
tekrarListesi.forEach(function(a){
out+='<div class="si" style="padding:8px 0">';
out+='<div style="font-size:18px;min-width:30px;text-align:center">'+(a.tur==='evde'?'🏠':'🌆')+'</div>';
out+='<div style="flex:1"><div style="font-weight:700;font-size:12px">'+esc(a.baslik)+'</div>';
out+='<div style="font-size:10px;color:var(--txtL)">👨 '+(a.puan_gorkem||'—')+' · 👩 '+(a.puan_esra||'—')+'</div></div>';
out+='<button style="background:var(--pL);color:var(--primary);border:none;border-radius:8px;padding:4px 8px;font-size:10px;font-weight:700;cursor:pointer;font-family:Nunito" onclick="sosyalTekrarPlanla('+a.id+')">📅</button>';
out+='</div>';});
out+='</div>';}

// Geçmiş aktiviteler listesi
out+='<div class="cd"><h3>📋 Geçmiş</h3>';
tamamlanan.slice(0,20).forEach(function(a){
out+='<div class="si" style="padding:8px 0;cursor:pointer" onclick="sosyalDetay('+a.id+')">';
out+='<div style="font-size:18px;min-width:30px;text-align:center">'+(a.tur==='evde'?'🏠':'🌆')+'</div>';
out+='<div style="flex:1"><div style="font-weight:700;font-size:12px">'+esc(a.baslik)+'</div>';
out+='<div style="font-size:10px;color:var(--txtL)">'+new Date(a.tarih).toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'})+(a.mekan?' · '+esc(a.mekan):'')+(a.harcama?' · '+fmt(a.harcama):'')+'</div></div>';
if(a.tekrar)out+='<span style="font-size:12px">🔁</span>';
out+='</div>';});
out+='</div>';
return out;}

// ─── MODAL: AKTİVİTE EKLE ──────────────────────────────────────────────────
function sosyalAktiviteEkle(){
var e=document.createElement('div');e.className='mo';e.onclick=function(){e.remove();};
e.innerHTML='<div class="md" onclick="event.stopPropagation()"><h3>🎯 Aktivite Planla</h3><div class="fc">'+
'<div><div class="fl">Başlık *</div><input id="saBas" placeholder="ör: Sinema, Piknik, Kutu Oyunu..."></div>'+
'<div><div class="fl">Tarih *</div><input id="saTar" type="date" value="'+tISO()+'"></div>'+
'<div class="g2"><div><div class="fl">Tür</div><select id="saTur"><option value="disari">🌆 Dışarı</option><option value="evde">🏠 Evde</option></select></div>'+
'<div><div class="fl">Mekan</div><input id="saMek" placeholder="opsiyonel"></div></div>'+
'<div><div class="fl">Tahmini Harcama (₺)</div><input id="saHar" type="number" placeholder="0"></div>'+
'<button class="btn" style="background:#E91E63;color:#fff" onclick="sosyalAktiviteKaydet()">💾 Kaydet</button>'+
'<button class="btn bg" onclick="this.closest(\'.mo\').remove()">İptal</button>'+
'</div></div>';
document.body.appendChild(e);}

function sosyalAktiviteKaydet(){
var bas=document.getElementById('saBas').value;
var tar=document.getElementById('saTar').value;
if(!bas||!tar){toast('Başlık ve tarih zorunlu!','warn');return;}
sosyalInitCheck();
S.SOSYAL.aktiviteler.push({
id:Date.now(),baslik:bas,tarih:tar,
tur:document.getElementById('saTur').value,
mekan:document.getElementById('saMek').value,
harcama:parseFloat(document.getElementById('saHar').value)||0,
puan_gorkem:0,puan_esra:0,not_gorkem:'',not_esra:'',
tekrar:null,tamamlandi:false
});
sv('SOSYAL');
// Finans'a da yaz
var har=parseFloat(document.getElementById('saHar').value)||0;
if(har>0&&S.GIDER){S.GIDER.push({id:Date.now()+1,dt:tar,amt:har,cat:'Sosyal',mod:'SOSYAL',desc:bas,usr:S.user||'Görkem'});sv('GIDER');}
var m=document.querySelector('.mo');if(m)m.remove();
toast('Aktivite planlandı!','succ');rn();}

function sosyalTamamla(id){

function hedefInitCheck(){
if(!S.HEDEF)S.HEDEF={liste:[]};
if(!S.HEDEF.liste)S.HEDEF.liste=[];}

// Otomatik ilerleme hesaplama
function hedefIlerleme(h){
if(h.tamamlandi)return 100;
if(h.tip==='manuel')return h.manuel_ilerleme||0;
// Otomatik: modülden veri oku
var now=new Date();var hedefDeger=h.hedef_deger||1;
var mevcut=0;
try{
if(h.mod==='MUTFAK'&&h.metrik==='haftalik_yemek'){
// Son 7 gündeki menü sayısı
var cnt=0;for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()-i);var k=d.toISOString().slice(0,10);if(S.M[k]){if(S.M[k].a)cnt++;if(S.M[k].k)cnt++;}}
mevcut=cnt;
}else if(h.mod==='PET'&&h.metrik==='veteriner_ziyaret'){
if(S.PET&&S.PET.vi){var all=[].concat(S.PET.vi.waffle||[],S.PET.vi.mayis||[]);mevcut=all.length;}
}else if(h.mod==='KASA'&&h.metrik==='birikim'){
if(S.KASA){mevcut=(S.KASA.gorkem||0)+(S.KASA.esra||0)+(S.KASA.ortak||0);}
}else if(h.mod==='SOSYAL'&&h.metrik==='aktivite_sayisi'){
if(S.SOSYAL&&S.SOSYAL.aktiviteler){mevcut=S.SOSYAL.aktiviteler.filter(function(a){return a.tamamlandi;}).length;}
}else if(h.mod==='GIDER'&&h.metrik==='aylik_harcama'){
var ay=now.getMonth();var yil=now.getFullYear();
if(S.GIDER){mevcut=S.GIDER.filter(function(g){var d=new Date(g.dt);return d.getMonth()===ay&&d.getFullYear()===yil;}).reduce(function(s,g){return s+g.amt;},0);}
}
}catch(e){}
var pct=Math.min(100,Math.round((mevcut/hedefDeger)*100));
return pct;}

var renk=pct>=100?'var(--succ)':pct>=50?'var(--warn)':'var(--primary)';

var bitisStr=h.bitis?'<div style="font-size:10px;color:var(--txtL);margin-top:4px">📅 Bitiş: '+h.bitis+'</div>':'';
return '<div class="cd fi" style="position:relative;'+(h.tamamlandi?'opacity:.7;':'')+'">'+
'<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
'<div style="flex:1"><div style="font-weight:800;font-size:14px">'+kisiIco+' '+esc(h.baslik)+'</div>'+
'<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">'+tipBadge+modBadge+'</div>'+
bitisStr+'</div>'+
'<div style="display:flex;gap:4px">'+
(h.tamamlandi?'<span style="font-size:18px">✅</span>':'')+
'<button class="del" onclick="hedefSil('+h.id+')" title="Sil">🗑️</button>'+

'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span>İlerleme</span><span style="font-weight:800;color:'+renk+'">%'+pct+'</span></div>'+
'<div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden">'+
'<div style="height:100%;width:'+pct+'%;background:'+renk+';border-radius:4px;transition:width .3s"></div></div></div>'+
(h.tip==='manuel'&&!h.tamamlandi?'<div style="display:flex;gap:6px;margin-top:8px"><input type="range" min="0" max="100" value="'+pct+'" style="flex:1" onchange="hedefManuelGuncelle('+h.id+',this.value)"><button class="btn bp" style="width:auto;padding:6px 12px;font-size:11px" onclick="hedefTamamla('+h.id+')">✓ Tamamla</button></div>':'')+
(h.tip==='otomatik'&&!h.tamamlandi&&pct>=100?'<button class="btn bs" style="margin-top:8px;font-size:11px" onclick="hedefTamamla('+h.id+')">🎉 Tamamlandı Olarak İşaretle</button>':'')+
'</div>';}

hedefInitCheck();
if(!confirm('Bu hedefi silmek istediğine emin misin?'))return;
S.HEDEF.liste=S.HEDEF.liste.filter(function(h){return h.id!==id;});
sv('HEDEF');toast('Hedef silindi','succ');rn();}

function hedefTamamla(id){
hedefInitCheck();
S.HEDEF.liste=S.HEDEF.liste.map(function(h){
if(h.id===id)return Object.assign({},h,{tamamlandi:true,manuel_ilerleme:100});
return h;});
sv('HEDEF');toast('🎉 Hedef tamamlandı!','succ');rn();}

function hedefManuelGuncelle(id,val){
hedefInitCheck();
S.HEDEF.liste=S.HEDEF.liste.map(function(h){
if(h.id===id)return Object.assign({},h,{manuel_ilerleme:parseInt(val)||0});
return h;});
sv('HEDEF');rn();}

// ─── ERAYLAR HEDEFLER SONU ──────────────────────────────────────────────────
</script>
