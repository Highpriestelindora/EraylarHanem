<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#F8F5FD;--card:#fff;--primary:#9B59B6;--pL:#EDE0F5;--mutfak:#E74C3C;--mutfakL:#FDEDEC;--arac:#5D6D7E;--sec:#2D6A4F;--sL:#D8F3DC;--acc:#E76F51;--txt:#2C2C2C;--txtL:#999;--brd:#E8E0F0;--danger:#E74C3C;--dangerL:#FDEDEC;--succ:#27AE60;--succL:#D5F5E3;--warn:#F39C12;--warnL:#FEF9E7;--r:14px;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);--safe-l:env(safe-area-inset-left,0px);--safe-r:env(safe-area-inset-right,0px)}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt)}
.app{display:flex;flex-direction:column;height:100dvh;height:-webkit-fill-available}
.hdr{padding:12px 18px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;padding-top:calc(12px + var(--safe-t));padding-left:calc(18px + var(--safe-l));padding-right:calc(18px + var(--safe-r))}
.hdr h1{color:#fff;font-family:'Fraunces',serif;font-size:17px;font-weight:800}
.hdr small{color:rgba(255,255,255,.6);font-size:9px}
.cnt{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + var(--safe-b));padding-left:calc(16px + var(--safe-l));padding-right:calc(16px + var(--safe-r))}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:6px 0;padding-bottom:calc(6px + var(--safe-b));padding-left:var(--safe-l);padding-right:var(--safe-r);z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.nav button{background:none;border:none;cursor:pointer;padding:6px 2px;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:44px;min-height:44px;justify-content:center}
.nav .ico{font-size:20px;transition:.15s}.nav .lbl{font-size:8px;font-weight:800}.nav .on .ico{transform:translateY(-2px)}.nav .on .dot{width:4px;height:4px;border-radius:2px;margin-top:1px}
.cd{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:0 1px 8px rgba(0,0,0,.05);border:1px solid var(--brd);margin-bottom:12px}
h2{font-family:'Fraunces',serif;font-size:20px;font-weight:800;margin-bottom:14px}
h3{font-family:'Fraunces',serif;font-size:15px;margin-bottom:10px}
input,select,textarea{padding:10px 12px;border:1px solid var(--brd);border-radius:12px;font-size:14px;font-family:'Nunito';outline:none;background:var(--bg);width:100%;color:var(--txt)}
input:focus,select:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 18px;border:none;border-radius:12px;font-size:13px;font-family:'Nunito';font-weight:700;cursor:pointer;transition:.15s;width:100%}.btn:active{transform:scale(.97)}
.bp{background:var(--primary);color:#fff}.bm{background:var(--mutfak);color:#fff}.ba{background:var(--arac);color:#fff}.bs{background:var(--sL);color:var(--sec)}.bd{background:var(--dangerL);color:var(--danger)}.bg{background:var(--card);color:var(--txtL);border:1px solid var(--brd)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fc{display:flex;flex-direction:column;gap:10px}
.fl{font-size:10px;color:var(--txtL);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800}
.del{background:none;border:none;cursor:pointer;font-size:14px;color:var(--danger);padding:4px}
.ubtn{background:rgba(255,255,255,.2);border:none;border-radius:20px;padding:6px 14px;color:#fff;font-size:12px;font-family:'Nunito';font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.fi{animation:fi .25s ease-out}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.login{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:24px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sd{width:8px;height:8px;border-radius:4px;display:inline-block;margin-right:4px}.sd.on{background:var(--succ);animation:pulse 2s infinite}.sd.off{background:var(--danger)}
.mt{border-radius:20px;padding:22px 14px;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden}.mt:active{transform:scale(.96)}
.wr{display:grid;grid-template-columns:50px 1fr 1fr 30px;padding:9px 8px;align-items:center;border-bottom:1px solid var(--brd)}.wr.cls-dis{background:#EBF5FB;border-left:3px solid #2980B9}
.ml{font-size:11px;padding:4px 8px;border-radius:8px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ml.ok{background:var(--sL);color:var(--sec)}.ml.no{background:var(--bg);color:var(--txtL);font-style:italic}.ml.ms{background:var(--dangerL);color:var(--danger)}
.wr.td{background:var(--pL);border-left:3px solid var(--primary)}.wr.we .dn{color:var(--mutfak)}
.rc{background:var(--card);border-radius:var(--r);border:1px solid var(--brd);overflow:hidden;cursor:pointer;transition:.2s}.rc:active{transform:scale(.97)}
.si{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--brd)}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.md{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:85dvh;overflow-y:auto;padding:20px;animation:su .3s ease-out}@keyframes su{from{transform:translateY(100%)}to{transform:none}}
.mf{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;overflow-y:auto;animation:fi .2s}
.dam{width:70px;height:140px;border-radius:10px 10px 18px 18px;border:3px solid var(--brd);position:relative;overflow:hidden;background:var(--card)}
.dam .wt{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#85C1E9,#3498DB);transition:height .3s;border-radius:0 0 15px 15px}
.dam .pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:800;z-index:1;text-shadow:0 0 4px rgba(255,255,255,.8)}
.sinp{width:55px;padding:5px;text-align:center;font-size:12px;border:1px solid var(--brd);border-radius:8px;background:var(--bg)}
.postit{width:110px;min-height:90px;padding:10px;border-radius:3px;box-shadow:2px 2px 6px rgba(0,0,0,.1);cursor:pointer;font-size:10px;line-height:1.4;transform:rotate(var(--rot));transition:.2s}.postit:active{transform:rotate(0deg) scale(1.05)}
.cc{border-radius:16px;padding:18px;color:#fff;margin-bottom:10px;position:relative}
</style>
</head>

window.DIAG_LOG=[];
window.DIAG_PERF={startTs:Date.now(),renders:0,slowOps:[]};

// Önceki session hatalarını yükle
try{const prev=sessionStorage.getItem('eray-diag');if(prev)window.DIAG_LOG=JSON.parse(prev)||[]}catch(e){}

function diagPush(entry){
  window.DIAG_LOG.unshift(entry);
  if(window.DIAG_LOG.length>100)window.DIAG_LOG=window.DIAG_LOG.slice(0,100);
  try{sessionStorage.setItem('eray-diag',JSON.stringify(window.DIAG_LOG))}catch(e){}
}

// JavaScript hataları
window.onerror=function(msg,src,line,col,err){
  diagPush({ts:new Date().toLocaleString('tr-TR'),type:'🔴 JS Hatası',
    msg:String(msg),
    loc:(src?src.split('/').pop():'')+':'+line+':'+col,
    stack:err&&err.stack?err.stack.slice(0,800):''});
  return false};

// Promise hataları
window.onunhandledrejection=function(ev){
  diagPush({ts:new Date().toLocaleString('tr-TR'),type:'🟠 Promise Hatası',
    msg:ev.reason?(String(ev.reason.message||ev.reason)):'Bilinmeyen promise hatası',
    loc:'',stack:ev.reason&&ev.reason.stack?ev.reason.stack.slice(0,800):''})};

// Manuel iz bırakma fonksiyonu — kritik noktalarda çağrılır
function diagTrace(label,data){
  diagPush({ts:new Date().toLocaleString('tr-TR'),type:'🔵 İz',
    msg:label,loc:'',stack:data?JSON.stringify(data).slice(0,400):''})
}

// Render sayacı
function diagRender(){
  window.DIAG_PERF.renders++;
  window.DIAG_PERF.lastRender=new Date().toLocaleString('tr-TR')
}

function gSeas(){const m=new Date().getMonth();if(m>=2&&m<=4)return'spring';if(m>=5&&m<=7)return'summer';if(m>=8&&m<=10)return'autumn';return'winter'}
function isSeas(r){const s=SEASONS[gSeas()];return(r.ig||[]).some(ig=>s.some(sv=>ig.toLowerCase().includes(sv)))}
function seasLbl(){return{spring:'🌸 İlkbahar',summer:'☀️ Yaz',autumn:'🍂 Sonbahar',winter:'❄️ Kış'}[gSeas()]}

function recentR(){const now=new Date(),two=new Date(now);two.setDate(now.getDate()-14);const used=new Set();Object.entries(S.M||{}).forEach(([dt,m])=>{try{if(new Date(dt)>=two){if(m.k)used.add(m.k);if(m.a)used.add(m.a)}}catch{}});return used}

// Günlük otomatik damacana düşümü
function checkDamDaily(){
  const today=tISO();
  const last=S.D.lastDate||today;
  if(last>=today)return;
  // Geçen gün sayısı
  const diff=Math.floor((new Date(today)-new Date(last))/864e5);
  if(diff<=0)return;
  const rate=S.D.dailyRate!=null?S.D.dailyRate:20;
  const drop=diff*rate;
  S.D.l1=Math.max(0,Math.round((S.D.l1!=null?S.D.l1:80)-drop));
  S.D.l2=Math.max(0,Math.round((S.D.l2!=null?S.D.l2:60)-drop));
  S.D.lastDate=today;
  sv('D');
}

function diagPanelH(){
const log=window.DIAG_LOG||[];
const errCount=log.filter(l=>l.type&&l.type.includes('Hatası')).length;
const perf=window.DIAG_PERF||{};
const fbDurum=typeof fbOn!=='undefined'&&fbOn;

// Sistem özeti
const summary={
  'Firebase':fbDurum?'🟢 Bağlı':'🔴 Çevrimdışı',
  'Tarif':S.R.length+' adet',
  'Buzdolabı':S.F.length+' kalem · Eksik: '+S.F.filter(f=>f.cr<f.mn).length,
  'Kiler':S.P.length+' kalem · Eksik: '+S.P.filter(p=>p.cr<p.mn).length,
  'Alışveriş':(S.SH||[]).filter(i=>!i.dn).length+' bekliyor',
  'Menü (bu hafta)':gw(0).filter(d=>{const m=S.M[d.dt]||{};return m.k&&m.a}).length+'/7',
  'Render sayısı':(perf.renders||0)+' (bu session)',
  'Son render':perf.lastRender||'—',
  'Hata sayısı':errCount+' (bu session)'
};

return'<div class="cd" style="border:2px solid '+(errCount>0?'var(--danger)':'var(--brd)')+'">'+
'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
'<h3 style="margin:0">🔬 Diagnostics</h3>'+
'<div style="display:flex;gap:6px">'+
'<button style="font-size:10px;padding:5px 10px;border-radius:8px;border:1px solid var(--brd);background:var(--bg);cursor:pointer;font-family:Nunito;font-weight:700" onclick="diagKopyala()">📋 Kopyala</button>'+
'<button style="font-size:10px;padding:5px 10px;border-radius:8px;border:1px solid var(--dangerL);background:var(--dangerL);color:var(--danger);cursor:pointer;font-family:Nunito;font-weight:700" onclick="window.DIAG_LOG=[];try{sessionStorage.removeItem(\'eray-diag\')}catch(e){}rn()">Temizle</button>'+
'</div></div>'+
// Sistem özeti
'<div style="background:var(--bg);border-radius:10px;padding:10px;margin-bottom:10px">'+
'<div style="font-size:9px;font-weight:800;color:var(--txtL);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">📊 SİSTEM DURUMU</div>'+
Object.entries(summary).map(([k,v])=>
'<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--brd);font-size:10px">'+
'<span style="color:var(--txtL);font-weight:700">'+k+'</span>'+
'<span style="font-weight:700;color:'+(v.includes('🔴')||/Eksik: [1-9]/.test(v)?'var(--danger)':v.includes('🟢')?'var(--sec)':'var(--txt)')+'">'+v+'</span></div>').join('')+
'</div>'+
// Hata logu
(log.length===0?
'<div style="text-align:center;padding:16px;color:var(--sec);font-size:12px;font-weight:700">✅ Hiç hata yakalanmadı!<br><span style="font-size:10px;color:var(--txtL);font-weight:400">Bu session boyunca log temiz</span></div>':
'<div style="font-size:9px;font-weight:800;color:var(--txtL);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">🪲 YAKALANAN HATALAR ('+log.length+')</div>'+
log.slice(0,15).map(l=>'<div style="background:'+(l.type&&l.type.includes('🔴')?'var(--dangerL)':l.type&&l.type.includes('🟠')?'var(--warnL)':'var(--pL)')+';border-radius:8px;padding:8px;margin-bottom:6px;font-size:10px">'+
'<div style="display:flex;justify-content:space-between;margin-bottom:3px">'+
'<span style="font-weight:800">'+esc(l.type||'İz')+'</span>'+
'<span style="color:var(--txtL);font-size:9px">'+esc(l.ts)+'</span>'+
'</div>'+
'<div style="font-weight:700;word-break:break-all">'+esc(l.msg)+'</div>'+
(l.loc?'<div style="color:var(--txtL);font-size:9px;margin-top:2px">📍 '+esc(l.loc)+'</div>':'')+
(l.stack?'<details style="margin-top:4px"><summary style="font-size:9px;cursor:pointer;color:var(--txtL)">Stack trace</summary><pre style="font-size:8px;white-space:pre-wrap;margin-top:4px;word-break:break-all;opacity:.8">'+esc(l.stack)+'</pre></details>':'')+
'</div>').join('')+
(log.length>15?'<p style="font-size:10px;text-align:center;color:var(--txtL)">+'+(log.length-15)+' daha (kopyala ile hepsini al)</p>':''))+
'</div>'}

const num=parseFloat((item.qt||'').match(/[\d.]+/)?.[0])||0;

sv('SH');rn()}

const item=(key==='F'?S.F:key==='DON'?S.DON:S.P).find(x=>x.n===nm);
if(!item)return;
// Stoktan düş (sıfırlama değil — kullanıcının söylediği kadar)
const newCr=Math.max(0,Math.round((item.cr-qty)*10)/10);

if(!S.TK[nm])S.TK[nm]={history:[],avg:0};

S.TK[nm].avg=Math.round(S.TK[nm].history.reduce((a,b)=>a+b,0)/S.TK[nm].history.length);
item.avgDays=S.TK[nm].avg;item.ft=tISO();}
// Alışverişe ekle (mevcut yoksa)
if(!S.SH.some(s=>s.nm.toLowerCase()===nm.toLowerCase()&&!s.dn)){
const neededQty=item.mn>0?item.mn:qty;

S.SH.push({id:Date.now()+Math.random(),nm,qt,mk:item.mk||'BİM',br:item.br||'',pr:0,dn:false,ab:'BİTTİ'});

});

item.avgDays=S.TK[nm].avg;item.ft=tISO();}

rn();}

// Ekmek tazeliği: gün farkına göre durum
function ekTazelik(dt,raf){
  if(!dt)return{renk:'var(--brd)',yazı:'var(--txtL)',etiket:'?',pct:0,icon:'❓'};
  const gun=Math.floor((Date.now()-new Date(dt))/864e5);
  const kalan=Math.max(0,raf-gun);
  const pct=Math.max(0,Math.min(100,Math.round(kalan/raf*100)));
  if(kalan<=0)return{renk:'var(--danger)',yazı:'#791F1F',etiket:'Bayat!',pct:0,icon:'🔴'};
  if(kalan===1)return{renk:'var(--warn)',yazı:'#7D6608',etiket:'Son gün',pct,icon:'🟡'};
  if(pct>=60)return{renk:'var(--succ)',yazı:'#085041',etiket:kalan+' gün',pct,icon:'🟢'};
  return{renk:'var(--warn)',yazı:'#7D6608',etiket:kalan+' gün',pct,icon:'🟡'};
}

// Hızlı 1 adet ekle (bugünün tarihi)
function ekHizliEkle(tip,ic,raf,mk){
  if(!S.EK)S.EK=[];
  // Aynı tip varsa adet artır
  const mevcut=S.EK.find(e=>e.tip===tip&&ekTazelik(e.dt,e.raf).pct>0);
  if(mevcut){mevcut.adet=(mevcut.adet||1)+1;}
  else{S.EK.push({id:Date.now(),tip,ic,raf,mk,adet:1,dt:tISO()});}
  sv('EK');toast('🍞 '+tip+' eklendi!','succ',2000);rn();
}
